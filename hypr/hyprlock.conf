# Hyprlock Configuration - Minimal & Aesthetic
# Place this file at ~/.config/hypr/hyprlock.conf

# Background
background {
    monitor =
    path = ~/.cache/wal/current-wallpaper
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# General settings
general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
    no_fade_in = false
    no_fade_out = false
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, 300
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.6)
    font_size = 24
    font_family = SF Pro Display
    position = 0, 180
    halign = center
    valign = center
}

# Profile Picture
image {
    monitor =
    path = /home/ethan/Pictures/Wallpapers/woods.jpg
    size = 150
    rounding = 30
    border_size = 0
    border_color = rgba(255, 255, 255, 0.3)
    position = 0, 40
    halign = center
    valign = center
}

# User
label {
    monitor =
    text =     $USER
    color = rgba(255, 255, 255, 0.8)
    font_size = 18
    font_family = SF Pro Display
    position = 0, -70
    halign = center
    valign = center
}

# Password input box
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.2)
    font_color = rgba(255, 255, 255, 0.9)
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <span foreground="##ffffff99">Enter Password</span>
    hide_input = false
    rounding = 25
    check_color = rgba(204, 136, 34, 0)
    fail_color = rgba(204, 34, 34, 0)
    fail_text = <span foreground="##ff6b6b">Incorrect</span>
    fail_transition = 300
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false
    position = 0, -200
    halign = center
    valign = center
}
